name: Deploy mockup a GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Publicar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          include_dotfiles: true
          
      - name: ✅ Despliegue completado
        run: |
          echo "🚀 mockup.html publicado en GitHub Pages"
          echo "📍 URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
